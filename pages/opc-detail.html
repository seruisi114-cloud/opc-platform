<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPC详情 — OPC职业平台</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav>
  <a href="../index.html" class="nav-brand">OPC<span>职业平台</span></a>
  <div class="nav-links">
    <a href="tasks.html">任务大厅</a>
    <a href="opc-hall.html">OPC大厅</a>
    <a href="my-tasks.html">我的任务</a>
    <a href="chat.html">消息</a>
    <a href="eval.html">评价</a>
  </div>
  <div class="nav-user">
    <div class="avatar">我</div>
  </div>
</nav>
<div class="container">
  <div class="detail-header">
    <a href="opc-hall.html" class="back-btn">←</a>
    <div class="detail-title" id="opc-detail-name">OPC 详情</div>
  </div>
  <div class="detail-grid">
    <div class="detail-main">
      <div class="card">
        <div class="card-title">个人简介</div>
        <div id="opc-detail-bio" style="font-size:13px; line-height:1.7; color:#374151;"></div>
      </div>
      <div class="card">
        <div class="card-title">可承接的项目类型</div>
        <div id="opc-detail-services" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
      </div>
      <div class="card">
        <div class="card-title">历史评价</div>
        <div id="opc-detail-reviews" style="font-size:13px; color:var(--text-light);">暂无评价</div>
      </div>
    </div>
    <div class="detail-side">
      <div class="card">
        <div class="card-title">信誉数据</div>
        <div class="info-row"><span class="info-label">评分</span>
          <span class="info-val" style="color:var(--warning);" id="opc-detail-rating">-</span>
        </div>
        <div class="info-row"><span class="info-label">成交次数</span><span class="info-val" id="opc-detail-orders">-</span></div>
        <div class="info-row"><span class="info-label">成交率</span><span class="info-val" style="color:var(--success);" id="opc-detail-rate">-</span></div>
        <div class="info-row"><span class="info-label">专注领域</span><span class="info-val" id="opc-detail-category">-</span></div>
        <div class="info-row"><span class="info-label">平均成交额</span><span class="info-val" id="opc-detail-avg">-</span></div>
      </div>
      <div class="card">
        <div class="card-title">在线状态</div>
        <div id="opc-online-status" style="display:flex; align-items:center; gap:8px;"></div>
      </div>
      <div class="card action-card">
        <button class="btn btn-primary" onclick="inviteOPC()">💬 发起合作邀请</button>
        <a href="chat.html" class="btn btn-outline">进入对话</a>
      </div>
    </div>
  </div>
</div>
<div class="notif" id="notif"></div>
<script src="../js/app.js"></script>
<script>
(function() {
  const id = parseInt(getParam('id'));
  const data = getData();
  const o = data.opcs.find(x => x.id === id);
  if (!o) { document.getElementById('opc-detail-name').textContent = 'OPC 未找到'; return; }
  document.getElementById('opc-detail-name').textContent = o.name + ' — ' + o.title;
  document.getElementById('opc-detail-bio').textContent = o.bio;
  document.getElementById('opc-detail-services').innerHTML = o.services.map(s => `<span class="tag tag-blue">${s}</span>`).join('');
  document.getElementById('opc-detail-rating').textContent = '★ ' + o.rating;
  document.getElementById('opc-detail-orders').textContent = o.orders + ' 次';
  document.getElementById('opc-detail-rate').textContent = Math.round(o.rate * 100) + '%';
  document.getElementById('opc-detail-category').textContent = o.category;
  document.getElementById('opc-detail-avg').textContent = '¥' + o.avgDeal;
  document.getElementById('opc-detail-reviews').textContent = o.reviews;
  document.getElementById('opc-online-status').innerHTML = o.online
    ? `<div style="width:10px; height:10px; border-radius:50%; background:var(--success);"></div><span style="font-size:13px; font-weight:500; color:var(--success);">在线</span>`
    : `<div style="width:10px; height:10px; border-radius:50%; background:#D1D5DB;"></div><span style="font-size:13px; color:#6B7280;">离线</span>`;
  window._currentOPC = o;
})();
function inviteOPC() {
  const o = window._currentOPC;
  if (!o) return;
  showNotif('已向 ' + o.name + ' 发送合作邀请，等待对方响应', 'success');
  setTimeout(() => location.href = 'chat.html', 1500);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
</body>
</html>
