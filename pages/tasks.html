<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务大厅 — OPC职业平台</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="prototype-banner">
  🎨 OPC职业平台测试 — 交互原型 · 仅供验证使用
  <span>（数据均为模拟，不涉及真实交易）</span>
</div>

<nav>
  <a href="../index.html" class="nav-brand">OPC<span>职业平台</span></a>
  <div class="nav-links">
    <a href="tasks.html" class="active">任务大厅</a>
    <a href="opc-hall.html">OPC大厅</a>
    <a href="my-tasks.html">我的任务</a>
    <a href="chat.html">消息</a>
    <a href="eval.html">评价</a>
  </div>
  <div class="nav-user">
    <div class="avatar">我</div>
  </div>
</nav>

<div class="container">
  <div class="section-header">
    <h1>任务大厅</h1>
    <button class="btn btn-primary" onclick="openPublishModal()">发布任务</button>
  </div>
  <div class="filters">
    <select class="filter-select" id="filter-category">
      <option value="">全部分类</option>
      <option>设计</option><option>开发</option><option>文案</option>
      <option>视频动画</option><option>营销</option><option>音频配音</option>
    </select>
    <select class="filter-select" id="filter-budget">
      <option value="">预算不限</option>
      <option value="low">500元以下</option>
      <option value="mid">500-3000元</option>
      <option value="high">3000元以上</option>
    </select>
    <div class="filter-tag selected" id="filter-short" onclick="toggleTag(this); renderTasks()">
      <span class="dot tag-short"></span> 短期
    </div>
    <div class="filter-tag selected" id="filter-long" onclick="toggleTag(this); renderTasks()">
      <span class="dot tag-long"></span> 长期
    </div>
  </div>
  <div class="task-list" id="task-list"></div>
</div>

<!-- PUBLISH MODAL -->
<div class="modal-overlay hidden" id="publish-modal">
  <div class="modal">
    <h2>发布任务</h2>
    <div class="form-group">
      <label>任务标题</label>
      <input id="pub-title" placeholder="例如：帮我设计一个Logo">
    </div>
    <div class="form-group">
      <label>任务描述</label>
      <textarea id="pub-desc" placeholder="详细描述你的需求..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分类</label>
        <select id="pub-category">
          <option>设计</option><option>开发</option><option>文案</option>
          <option>视频动画</option><option>营销</option><option>音频配音</option>
        </select>
      </div>
      <div class="form-group">
        <label>类型</label>
        <select id="pub-type">
          <option value="short">短期</option><option value="long">长期</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>预算（元）</label>
        <input id="pub-price" type="number" placeholder="3000">
      </div>
      <div class="form-group">
        <label>截止日期</label>
        <input id="pub-deadline" type="date">
      </div>
    </div>
    <div class="form-group">
      <label>验收标准</label>
      <textarea id="pub-standards" placeholder="明确说出什么是"完成"..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closePublishModal()">取消</button>
      <button class="btn btn-primary" onclick="publishTask()">发布</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>
<script src="../js/app.js"></script>
<script>
function renderTasks() {
  const data = getData();
  const cat = document.getElementById('filter-category').value;
  const budget = document.getElementById('filter-budget').value;
  const showShort = document.getElementById('filter-short').classList.contains('selected');
  const showLong = document.getElementById('filter-long').classList.contains('selected');

  const filtered = data.tasks.filter(t => {
    if (cat && t.category !== cat) return false;
    if (budget === 'low' && t.price >= 500) return false;
    if (budget === 'mid' && (t.price < 500 || t.price > 3000)) return false;
    if (budget === 'high' && t.price <= 3000) return false;
    if (!showShort && t.type === 'short') return false;
    if (!showLong && t.type === 'long') return false;
    return true;
  });

  document.getElementById('task-list').innerHTML = filtered.length === 0
    ? `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">暂无符合条件的任务</div></div>`
    : filtered.map(t => taskCardHTML(t)).join('');
}

document.getElementById('filter-category').addEventListener('change', renderTasks);
document.getElementById('filter-budget').addEventListener('change', renderTasks);
renderTasks();
</script>
</body>
</html>
