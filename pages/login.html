<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 / 注册 — OPC职业平台</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
  .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px 28px; }
  .login-brand { text-align: center; margin-bottom: 24px; }
  .login-brand h1 { font-size: 22px; margin-bottom: 4px; }
  .login-brand p { font-size: 13px; color: var(--text-light); }
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
  .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 600; color: var(--text-light); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; box-sizing: border-box; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
  .form-group small { font-size: 11px; color: var(--text-light); margin-top: 4px; display: block; }
  .btn-full { width: 100%; padding: 12px; font-size: 15px; border-radius: 8px; }
  .error-msg { color: #EF4444; font-size: 12px; margin-top: 8px; display: none; }
  .success-msg { color: #10B981; font-size: 12px; margin-top: 8px; display: none; }
  .back-link { display: block; text-align: center; margin-top: 16px; color: var(--text-light); font-size: 13px; text-decoration: none; }
  .back-link:hover { color: var(--primary); }
  .toggle-pwd { position: relative; }
  .toggle-pwd-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 12px; padding: 4px 8px; }
  .toggle-pwd input { padding-right: 60px; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <h1>OPC<span style="color:var(--primary)">职业平台</span></h1>
      <p>一个人 + 多个 AI Agent = 无限生产力</p>
    </div>
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">登录</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">注册</div>
    </div>
    <!-- 登录表单 -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="login-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="toggle-pwd">
          <input type="password" id="login-password" placeholder="••••••••" required>
          <button type="button" class="toggle-pwd-btn" onclick="togglePassword('login-password', this)">显示</button>
        </div>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">登录</button>
    </form>
    <!-- 注册表单 -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="reg-username" placeholder="输入用户名" required>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="reg-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>密码 <small>（至少6位）</small></label>
        <div class="toggle-pwd">
          <input type="password" id="reg-password" placeholder="••••••••" minlength="6" required>
          <button type="button" class="toggle-pwd-btn" onclick="togglePassword('reg-password', this)">显示</button>
        </div>
      </div>
      <div class="form-group">
        <label>账号类型</label>
        <select id="reg-type">
          <option value="personal">个人端（短期买家）</option>
          <option value="enterprise">企业端（OPC/长期需求方）</option>
        </select>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <div class="success-msg" id="reg-success"></div>
      <button type="submit" class="btn btn-primary btn-full" id="reg-btn">注册</button>
    </form>
    <a href="../index.html" class="back-link">← 返回首页</a>
  </div>
</div>
<script>
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('reg-error').style.display = 'none';
  document.getElementById('reg-success').style.display = 'none';
}
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '隐藏';
  } else {
    input.type = 'password';
    btn.textContent = '显示';
  }
}
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = '登录中...';
  errorEl.style.display = 'none';
  const { data, error } = await signIn(email, password);
  if (error) {
    errorEl.textContent = '登录失败：' + error.message;
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '登录';
  } else {
    const referrer = document.referrer || '../index.html';
    // Redirect back for login pages under /pages/
    if (referrer.includes('/pages/')) {
      location.href = referrer;
    } else {
      location.href = '../index.html';
    }
  }
}
async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const accountType = document.getElementById('reg-type').value;
  const errorEl = document.getElementById('reg-error');
  const successEl = document.getElementById('reg-success');
  btn.disabled = true;
  btn.textContent = '注册中...';
  errorEl.style.display = 'none';
  successEl.style.display = 'none';
  const { data, error } = await signUp(email, password, username);
  if (error) {
    errorEl.textContent = '注册失败：' + error.message;
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '注册';
  } else {
    // Try to set account_type
    if (data.user) {
      const sb = getSupabase();
      await sb.from('profiles').update({ account_type: accountType }).eq('id', data.user.id);
    }
    successEl.textContent = '注册成功！请查收验证邮件，验证后登录。';
    successEl.style.display = 'block';
    btn.textContent = '已发送';
    setTimeout(() => switchTab('login'), 2000);
  }
}
// Auto-switch to login if already logged in
(async () => {
  if (await isLoggedIn()) {
    location.href = '../index.html';
  }
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
</body>
</html>
